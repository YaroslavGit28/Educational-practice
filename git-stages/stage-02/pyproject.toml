[tool.black]
line-length = 100
target-version = ["py312"]
exclude = [".venv", "migrations"]

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".venv", "migrations"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "magazin.settings"
pythonpath = ["apps"]
testpaths = ["tests"]
python_files = ["test_*.py"]
