{% extends 'base.html' %}

{% block title %}{% if product %}Редактирование{% else %}Новый товар{% endif %}{% endblock %}

{% block content %}
<h1>{% if product %}Редактирование: {{ product.name }}{% else %}Новый товар{% endif %}</h1>

<div class="card mt-4">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input type="text" name="name" class="form-control" value="{{ product.name|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Категория</label>
                <select name="category" class="form-select" required>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Цена</label>
                    <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price|default:'' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Остаток</label>
                    <input type="number" name="stock" class="form-control" value="{{ product.stock|default:0 }}" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="4">{{ product.description|default:'' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Фото</label>
                <input type="file" name="image" class="form-control" accept="image/*">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive"
                       {% if not product or product.is_active %}checked{% endif %}>
                <label class="form-check-label" for="isActive">Активен</label>
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'admin_panel:product_list' %}" class="btn btn-outline-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
