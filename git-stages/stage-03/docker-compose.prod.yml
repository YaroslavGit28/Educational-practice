services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env.production
    environment:
      - DEBUG=false
      - APP_ENV=production
    volumes:
      - app_data:/app/data
      - app_media:/app/media
      - app_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app_data:
  app_media:
  app_logs:
