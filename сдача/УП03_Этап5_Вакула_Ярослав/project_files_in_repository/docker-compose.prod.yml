services:
  app:
    build: .
    # Если у вас есть docker-entrypoint.sh, он будет выполнен, а затем запустится команда ниже
    command: manage.py runserver 0.0.0.0:8000
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env.production
    environment:
      - DEBUG=false
      - APP_ENV=production
    volumes:
      # Тома для данных, медиа и логов
      - app_data:/app/data
      - app_media:/app/media
      - app_logs:/app/logs
      # Том для файла SQLite (чтобы данные не терялись)
      - ./db.sqlite3:/app/db.sqlite3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app_data:
  app_media:
  app_logs: