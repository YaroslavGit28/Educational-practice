{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <h2 class="h4 mb-3">Вход в аккаунт</h2>
    <form method="post" class="bg-white p-4 rounded-4 shadow-sm">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary w-100">Войти</button>
      <a class="btn btn-link w-100 mt-2" href="{% url 'users:password_reset' %}">Забыли пароль?</a>
    </form>
  </div>
</div>
{% endblock %}
