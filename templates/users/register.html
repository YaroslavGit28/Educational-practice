{% extends 'base.html' %}

{% block title %}Регистрация - Канцтовары{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><h4>Регистрация</h4></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
                </form>
                <p class="mt-3 mb-0">Уже есть аккаунт? <a href="{% url 'users:login' %}">Войти</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
