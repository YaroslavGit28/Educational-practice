{% extends "base.html" %}
{% block content %}
<h2>Заказ #{{ order.pk }}</h2>
<p>Статус: <span class="badge status-{{ order.status.name }}">{{ order.status.name }}</span></p>
{% for item in order.items.all %}
<div>{{ item.product.name }} x {{ item.quantity }} = {{ item.subtotal }} ₽</div>
{% endfor %}
{% endblock %}
