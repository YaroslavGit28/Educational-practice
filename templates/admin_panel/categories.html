{% extends "base.html" %}
{% block content %}
<h2>Категории</h2>
<a href="{% url 'admin_panel:category_create' %}" class="btn btn-primary btn-sm mb-2">Добавить</a>
{% for c in categories %}
  <div class="bg-white p-2 rounded mb-1 d-flex justify-content-between align-items-center">
    <div>
      <b>{{ c.name }}</b>
      {% if c.parent %}<span class="text-muted">/ parent: {{ c.parent.name }}</span>{% endif %}
    </div>
    <a class="btn btn-sm btn-outline-secondary" href="{% url 'admin_panel:category_edit' c.pk %}">Редактировать</a>
  </div>
{% endfor %}
{% endblock %}
